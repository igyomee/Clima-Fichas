<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fichas Técnicas Climatización</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0C447C;
      --blue-light: #E6F1FB;
      --blue-mid: #B5D4F4;
      --text: #1a2332;
      --text-sec: #5a6a7e;
      --border: #dde4ec;
      --bg: #f4f7fb;
      --white: #ffffff;
      --green: #2d7a2d;
      --green-bg: #eaf5ea;
      --red: #c0392b;
      --red-bg: #fdf0ee;
      --gray-bg: #f0f3f7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== PANTALLA DE CARGA ===== */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--blue);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: white; gap: 16px;
    }
    #loading-screen .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { font-size: 15px; opacity: 0.85; }

    /* ===== FICHA INDIVIDUAL ===== */
    #ficha-view { display: none; padding: 0; min-height: 100vh; }

    .ficha-header {
      background: var(--blue);
      padding: 20px 20px 16px;
      color: white;
    }
    .ficha-header .badge-codigo {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .ficha-header .equipo-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .ficha-header h1 {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .ficha-header .centro-tag {
      font-size: 13px;
      opacity: 0.75;
    }

    .ficha-modelo-bar {
      background: var(--blue-light);
      border-bottom: 1px solid var(--blue-mid);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .badge-modelo {
      background: var(--blue);
      color: white;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .badge-tipo {
      background: var(--blue-mid);
      color: var(--blue);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .ficha-body { padding: 16px 16px 32px; display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: var(--white);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 10px 14px 0;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); }
    .grid-cell {
      background: var(--white);
      padding: 12px 14px;
    }
    .grid-cell .label {
      font-size: 11px;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .grid-cell .value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }
    .grid-cell .value.big {
      font-size: 20px;
    }
    .grid-cell .unit {
      font-size: 11px;
      color: var(--text-sec);
      margin-top: 2px;
    }
    .grid-cell .value.highlight { color: var(--blue); }
    .grid-cell .value.empty { color: #bbb; font-style: italic; font-size: 13px; }

    .serie-row {
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 2px;
    }

    .status-row {
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green { background: var(--green); }
    .status-dot.gray { background: #bbb; }
    .status-text { font-size: 13px; color: var(--text); }

    .ficha-footer {
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: var(--gray-bg);
      display: flex; justify-content: space-between; align-items: center;
    }
    .ficha-footer span { font-size: 11px; color: var(--text-sec); }
    .btn-back {
      font-size: 12px;
      color: var(--blue);
      background: var(--blue-light);
      border: 1px solid var(--blue-mid);
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      text-decoration: none;
    }

    /* ===== LISTADO ===== */
    #list-view { display: none; }

    .list-header {
      background: var(--blue);
      color: white;
      padding: 20px 16px 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .list-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .list-header p { font-size: 13px; opacity: 0.75; margin-bottom: 12px; }
    .search-box {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      outline: none;
      background: rgba(255,255,255,0.95);
    }

    .filter-bar {
      padding: 10px 16px;
      display: flex; gap: 8px;
      overflow-x: auto;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      white-space: nowrap;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 12px;
      cursor: pointer;
      color: var(--text-sec);
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    .equipo-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

    .equipo-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .equipo-card:hover { border-color: var(--blue-mid); box-shadow: 0 2px 8px rgba(12,68,124,0.1); }
    .equipo-card .icon-wrap {
      width: 38px; height: 38px;
      background: var(--blue-light);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .equipo-card .info { flex: 1; min-width: 0; }
    .equipo-card .codigo { font-size: 11px; font-weight: 600; color: var(--blue); margin-bottom: 2px; }
    .equipo-card .nombre { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .equipo-card .centro-small { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
    .equipo-card .arrow { color: var(--text-sec); flex-shrink: 0; }

    .no-results { text-align: center; padding: 40px 20px; color: var(--text-sec); }

    /* ===== VISTA IMPRESIÓN QR ===== */
    #print-view { display: none; }
    @media print {
      body { background: white; }
      #list-view, #ficha-view, #loading-screen { display: none !important; }
      #print-view { display: block !important; }
      .print-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 10px;
      }
      .print-card {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .print-card .qr-wrap { display: flex; justify-content: center; margin-bottom: 6px; }
      .print-card .print-codigo { font-size: 10px; font-weight: 700; color: #0C447C; }
      .print-card .print-nombre { font-size: 8px; color: #555; margin-top: 2px; line-height: 1.3; }
    }
  </style>
</head>
<body>

<!-- PANTALLA DE CARGA -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p>Cargando equipos...</p>
</div>

<!-- VISTA FICHA INDIVIDUAL -->
<div id="ficha-view">
  <div class="ficha-header">
    <div class="equipo-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="8" rx="2"/>
        <path d="M3 13h18"/><path d="M8 17l4-4 4 4"/>
      </svg>
    </div>
    <div class="badge-codigo" id="f-codigo"></div>
    <h1 id="f-nombre"></h1>
    <div class="centro-tag" id="f-centro"></div>
  </div>

  <div class="ficha-modelo-bar">
    <span class="badge-modelo" id="f-modelo-badge"></span>
    <span class="badge-tipo" id="f-tipo-badge"></span>
  </div>

  <div class="ficha-body">

    <div class="card">
      <div class="card-title">Identificación</div>
      <div class="grid-2">
        <div class="grid-cell">
          <div class="label">Nº de Serie</div>
          <div class="value" id="f-serie"></div>
        </div>
        <div class="grid-cell">
          <div class="label">Refrigerante</div>
          <div class="value" id="f-refrigerante"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Datos de Carga</div>
      <div class="grid-3">
        <div class="grid-cell" style="text-align:center">
          <div class="label">Carga</div>
          <div class="value big highlight" id="f-carga"></div>
          <div class="unit">kg</div>
        </div>
        <div class="grid-cell" style="text-align:center">
          <div class="label">GWP</div>
          <div class="value big" id="f-gwp"></div>
          <div class="unit">puntos</div>
        </div>
        <div class="grid-cell" style="text-align:center">
          <div class="label">CO₂ eq.</div>
          <div class="value big highlight" id="f-co2"></div>
          <div class="unit">ton</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="status-row">
        <div class="status-dot" id="f-status-dot"></div>
        <div class="status-text" id="f-status-text"></div>
      </div>
    </div>

  </div>

  <div class="ficha-footer">
    <span id="f-instalacion"></span>
    <a class="btn-back" href="#" onclick="showList(); return false;">← Ver todos</a>
  </div>
</div>

<!-- VISTA LISTADO -->
<div id="list-view">
  <div class="list-header">
    <h1>Climatización</h1>
    <p id="list-count">Cargando equipos...</p>
    <input class="search-box" type="search" id="search-input" placeholder="🔍  Buscar por código o nombre..." oninput="filterList()">
  </div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="equipo-list" id="equipo-list"></div>
</div>

<!-- VISTA IMPRESIÓN QR (solo se ve al imprimir) -->
<div id="print-view">
  <div class="print-grid" id="print-grid"></div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN — CAMBIA SOLO ESTA URL
// ============================================================
// Pasos para obtener tu URL CSV de Google Sheets:
// 1. Abre tu Google Sheet
// 2. Archivo → Compartir → Publicar en la web
// 3. Selecciona la hoja "CLIMA" y formato "Valores separados por comas (.csv)"
// 4. Haz clic en "Publicar" y copia la URL que aparece
// 5. Pégala aquí abajo sustituyendo el texto de ejemplo:

const SHEET_CSV_URL = 'TU_URL_CSV_AQUI';

// Si no tienes aún la URL publicada, el sistema usa los datos del CSV que subiste.
// ============================================================

const COL = {
  CENTRO: 1, TAG_CENTRO: 2, INSTALACION: 3, TAG_INST: 4,
  SUBINSTALACION: 5, TAG_SUB: 6, FAMILIA: 7, TAG_FAM: 8,
  CODIGO: 9, NOMBRE: 10, MODELO: 11, SERIE: 12,
  REFRIGERANTE: 13, CARGA: 14, GWP: 15, CO2: 16, SELLADO: 17
};

let allEquipos = [];
let activeFilter = 'TODOS';

function val(row, idx) {
  return (row[idx] || '').toString().trim();
}

function parseData(results) {
  const rows = results.data;
  const equipos = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const codigo = val(r, COL.CODIGO);
    if (!codigo || codigo === '' || codigo === ' ') continue;
    equipos.push({
      codigo:       codigo,
      nombre:       val(r, COL.NOMBRE),
      centro:       val(r, COL.CENTRO),
      tagCentro:    val(r, COL.TAG_CENTRO),
      instalacion:  val(r, COL.INSTALACION),
      subinstalacion: val(r, COL.SUBINSTALACION),
      familia:      val(r, COL.FAMILIA),
      tagFam:       val(r, COL.TAG_FAM),
      modelo:       val(r, COL.MODELO),
      serie:        val(r, COL.SERIE),
      refrigerante: val(r, COL.REFRIGERANTE),
      carga:        val(r, COL.CARGA),
      gwp:          val(r, COL.GWP),
      co2:          val(r, COL.CO2),
      sellado:      val(r, COL.SELLADO),
    });
  }
  return equipos;
}

function getTipo(eq) {
  const fam = eq.familia.toLowerCase();
  if (fam.includes('interior') || eq.tagFam === 'UI') return 'Unidad Interior';
  if (fam.includes('exterior') || eq.tagFam === 'UE') return 'Unidad Exterior';
  return eq.familia || 'Climatización';
}

function orEmpty(val, suffix) {
  return val ? val + (suffix || '') : '<span class="empty">Sin datos</span>';
}

function showFicha(codigo) {
  const eq = allEquipos.find(e => e.codigo === codigo);
  if (!eq) return;

  document.getElementById('f-codigo').textContent = eq.codigo;
  document.getElementById('f-nombre').textContent = eq.nombre;
  document.getElementById('f-centro').textContent = eq.centro + (eq.instalacion ? ' · ' + eq.instalacion : '');
  document.getElementById('f-instalacion').textContent = eq.subinstalacion || '';

  const modeloText = eq.modelo || 'Modelo no registrado';
  document.getElementById('f-modelo-badge').textContent = modeloText;
  document.getElementById('f-tipo-badge').textContent = getTipo(eq);

  document.getElementById('f-serie').innerHTML = eq.serie ? eq.serie : '<span class="empty">Sin datos</span>';
  document.getElementById('f-refrigerante').innerHTML = eq.refrigerante ? eq.refrigerante : '<span class="empty">Sin datos</span>';
  document.getElementById('f-carga').innerHTML = eq.carga ? eq.carga : '<span class="empty">—</span>';
  document.getElementById('f-gwp').innerHTML = eq.gwp ? eq.gwp : '<span class="empty">—</span>';
  document.getElementById('f-co2').innerHTML = eq.co2 ? eq.co2 : '<span class="empty">—</span>';

  const dot = document.getElementById('f-status-dot');
  const txt = document.getElementById('f-status-text');
  if (eq.sellado && eq.sellado !== '0' && eq.sellado !== '') {
    dot.className = 'status-dot green';
    txt.innerHTML = '<strong>Sellado hermético:</strong> ' + eq.sellado;
  } else {
    dot.className = 'status-dot gray';
    txt.innerHTML = '<strong>Sellado hermético:</strong> Sin datos registrados';
  }

  document.getElementById('ficha-view').style.display = 'block';
  document.getElementById('list-view').style.display = 'none';
  window.scrollTo(0, 0);
  history.pushState({ codigo }, '', '#' + codigo);
}

function showList() {
  document.getElementById('ficha-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  history.pushState({}, '', '#');
}

function getCentros() {
  const centros = [...new Set(allEquipos.map(e => e.centro).filter(Boolean))].sort();
  return centros;
}

function buildFilterBar() {
  const bar = document.getElementById('filter-bar');
  const centros = getCentros();
  bar.innerHTML = '';

  const btnAll = document.createElement('button');
  btnAll.className = 'filter-btn active';
  btnAll.textContent = 'Todos';
  btnAll.onclick = () => setFilter('TODOS', btnAll);
  bar.appendChild(btnAll);

  centros.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = c;
    btn.onclick = () => setFilter(c, btn);
    bar.appendChild(btn);
  });
}

function setFilter(centro, btn) {
  activeFilter = centro;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterList();
}

function filterList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let filtered = allEquipos;
  if (activeFilter !== 'TODOS') filtered = filtered.filter(e => e.centro === activeFilter);
  if (q) filtered = filtered.filter(e =>
    e.codigo.toLowerCase().includes(q) ||
    e.nombre.toLowerCase().includes(q) ||
    e.modelo.toLowerCase().includes(q)
  );
  renderList(filtered);
}

function renderList(equipos) {
  const container = document.getElementById('equipo-list');
  const countEl = document.getElementById('list-count');
  countEl.textContent = equipos.length + ' equipos';

  if (equipos.length === 0) {
    container.innerHTML = '<div class="no-results">No se encontraron equipos</div>';
    return;
  }

  container.innerHTML = equipos.map(eq => `
    <a class="equipo-card" href="#${eq.codigo}" onclick="showFicha('${eq.codigo}'); return false;">
      <div class="icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0C447C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="8" rx="2"/>
          <path d="M3 13h18"/><path d="M8 17l4-4 4 4"/>
        </svg>
      </div>
      <div class="info">
        <div class="codigo">${eq.codigo}</div>
        <div class="nombre">${eq.nombre}</div>
        <div class="centro-small">${eq.centro}${eq.familia ? ' · ' + eq.familia : ''}</div>
      </div>
      <div class="arrow">›</div>
    </a>
  `).join('');
}

function buildPrintGrid(equipos) {
  const grid = document.getElementById('print-grid');
  grid.innerHTML = '';
  const base = window.location.href.split('#')[0];
  equipos.forEach(eq => {
    const card = document.createElement('div');
    card.className = 'print-card';
    const qrWrap = document.createElement('div');
    qrWrap.className = 'qr-wrap';
    const qrDiv = document.createElement('div');
    qrWrap.appendChild(qrDiv);
    card.appendChild(qrWrap);
    card.innerHTML += `
      <div class="print-codigo">${eq.codigo}</div>
      <div class="print-nombre">${eq.nombre}</div>
    `;
    grid.appendChild(card);
    try {
      new QRCode(qrDiv, {
        text: base + '#' + eq.codigo,
        width: 90, height: 90,
        colorDark: '#0C447C', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    } catch(e) {}
  });
}

function init(data) {
  allEquipos = parseData(data);
  buildFilterBar();
  renderList(allEquipos);
  buildPrintGrid(allEquipos);

  document.getElementById('loading-screen').style.display = 'none';

  const hash = window.location.hash.replace('#', '');
  if (hash && allEquipos.find(e => e.codigo === hash)) {
    showFicha(hash);
  } else {
    showList();
  }
}

window.addEventListener('popstate', () => {
  const hash = window.location.hash.replace('#', '');
  if (hash && allEquipos.find(e => e.codigo === hash)) {
    showFicha(hash);
  } else {
    showList();
  }
});

// ============================================================
// CARGA DE DATOS
// ============================================================
function loadFromURL() {
  Papa.parse(SHEET_CSV_URL, {
    download: true,
    skipEmptyLines: true,
    complete: init,
    error: () => {
      document.querySelector('#loading-screen p').textContent = 'Error al cargar los datos. Comprueba la URL del Sheet.';
    }
  });
}

// Detecta si la URL del Sheet está configurada
if (SHEET_CSV_URL && SHEET_CSV_URL !== 'TU_URL_CSV_AQUI') {
  loadFromURL();
} else {
  // DATOS DE RESPALDO EMBEBIDOS (del CSV subido)
  // Se usarán hasta que configures la URL de Google Sheets
  fetch('Fichas_QR_-_CLIMA.csv')
    .then(r => r.text())
    .then(csv => Papa.parse(csv, { skipEmptyLines: true, complete: init }))
    .catch(() => {
      document.querySelector('#loading-screen p').textContent =
        'Configura la URL de Google Sheets en el archivo HTML (variable SHEET_CSV_URL).';
    });
}
</script>
</body>
</html>
