  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F5F5F5; }

    .top-bar { background: #1A1A1A; border-bottom: 3px solid #E3A716; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .top-bar-logo { height: 42px; width: auto; }
    .company { font-size: 12px; font-weight: 700; color: #E3A716; }
    .address { font-size: 10px; color: rgba(255,255,255,0.6); line-height: 1.5; }
    .averias-badge { background: #CC2200; border-radius: 50%; width: 56px; height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #E3A716; }
    .av-365 { font-size: 13px; font-weight: 800; color: white; line-height: 1; }
    .av-24h { font-size: 9px; color: rgba(255,255,255,0.85); }
    .av-tel { font-size: 7px; color: #E3A716; font-weight: 700; text-align: center; margin-top: 1px; }

    .action-bar { background: #2B2B2B; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
    .action-bar p { font-size: 13px; color: rgba(255,255,255,0.7); }
    .action-bar span { font-size: 13px; color: #E3A716; font-weight: 600; }
    .btn-print { background: #E3A716; color: #1A1A1A; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-print:hover { background: #C48F10; }

    #status { text-align: center; padding: 40px; color: #666; font-size: 15px; }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }

    .qr-card {
      background: white; border: 1px solid #DCDCDC; border-radius: 10px;
      padding: 12px 10px 10px; display: flex; flex-direction: column;
      align-items: center; gap: 5px; break-inside: avoid; page-break-inside: avoid;
    }
    .qr-card img.card-logo { height: 16px; width: auto; }
    .qr-card canvas { width: 110px !important; height: 110px !important; display: block; }
    .qr-wrap img:not(.qr-img) { display: none !important; }
    .qr-card .codigo { font-size: 11px; font-weight: 700; color: #C48F10; text-align: center; letter-spacing: 0.04em; }
    .qr-card .nombre { font-size: 8px; color: #666; text-align: center; line-height: 1.3; }
    .qr-card .centro { font-size: 7.5px; color: #999; text-align: center; background: #F5F5F5; padding: 2px 7px; border-radius: 8px; border: 1px solid #ddd; }

    @media print {
      @page { margin: 8mm; }
      body { background: white; }
      .top-bar, .action-bar { display: none !important; }
      .grid { grid-template-columns: repeat(4, 1fr); gap: 5mm; padding: 0; }
      .qr-card { border: 0.5px solid #ccc; border-radius: 2mm; padding: 3mm; gap: 1.5mm; }
      .qr-card canvas, .qr-card img.qr-img { width: 90px !important; height: 90px !important; }
      .qr-card .codigo { font-size: 8pt; }
      .qr-card .nombre { font-size: 6pt; }
      .qr-card .centro { font-size: 5.5pt; }
    }
  </style>

function imprimirQR() {
  // Convertir todos los canvas de QR a imágenes antes de imprimir
  document.querySelectorAll('.qr-wrap canvas').forEach(function(canvas) {
    const img = document.createElement('img');
    img.className = 'qr-img';
    img.src = canvas.toDataURL('image/png');
    canvas.parentNode.replaceChild(img, canvas);
  });
  setTimeout(function() { window.print(); }, 300);
}

Papa.parse(SHEET_URL, {
  download: true,
  skipEmptyLines: true,
  complete: function(results) {
    const rows = results.data;
    const equipos = [];
    for (let i = 0; i < rows.length; i++) {
      const r      = rows[i];
      const codigo = (r[9]||'').toString().trim();
      if (!codigo || !codigo.includes('-')) continue;
      equipos.push({
        codigo,
        nombre: (r[10]||'').toString().trim(),
        centro: (r[1]||'').toString().trim(),
      });
    }

    document.getElementById('status').style.display = 'none';
    document.getElementById('count-label').textContent = equipos.length + ' equipos';

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    equipos.forEach(function(eq) {
      const card = document.createElement('div');
      card.className = 'qr-card';

      // Logo
      const logoEl = document.createElement('img');
      logoEl.src = LOGO;
      logoEl.className = 'card-logo';
      card.appendChild(logoEl);

      // QR
      const qrWrap = document.createElement('div');
      qrWrap.className = 'qr-wrap';
      const qrDiv = document.createElement('div');
      qrWrap.appendChild(qrDiv);
      card.appendChild(qrWrap);

      // Código
      const codigoEl = document.createElement('div');
      codigoEl.className = 'codigo';
      codigoEl.textContent = eq.codigo;
      card.appendChild(codigoEl);

      // Nombre
      if (eq.nombre) {
        const nombreEl = document.createElement('div');
        nombreEl.className = 'nombre';
        nombreEl.textContent = eq.nombre;
        card.appendChild(nombreEl);
      }

      // Centro
      if (eq.centro && eq.centro.toUpperCase() !== 'CENTRO') {
        const centroEl = document.createElement('div');
        centroEl.className = 'centro';
        centroEl.textContent = eq.centro;
        card.appendChild(centroEl);
      }

      grid.appendChild(card);

      try {
        new QRCode(qrDiv, {
          text: BASE_URL + '#' + eq.codigo,
          width: 110, height: 110,
          colorDark: '#1A1A1A',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch(e) { console.error(e); }
    });
  },
  error: function() {
    document.getElementById('status').textContent = 'Error al cargar los datos.';
  }
});
</script>
